<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romina & Hunter | 22.05.2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&display=swap" rel="stylesheet">

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Samarkan';
            src: url('fonts/samarkan.ttf') format('truetype');
            /* Ensure the filename matches exactly */
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --desi-red: #8B0000;
            --marigold: #FFB300;
            --cream: #FFFDF5;
            --gold: #D4AF37;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            color: #333;
            overflow-x: hidden;
        }

        h1,
        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--desi-red);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            width: 100%;
            /* REPLACE 'your-arc-image.jpg' with your actual file name or URL */
            background: url('images/arc3.png') no-repeat center center;
            background-size: contain;
            /* 'contain' keeps the whole arc visible */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--cream);
            /* Matches the background if image is small */
        }

        .hero-overlay {
            text-align: center;
            /* Adjust 'margin-top' if the names need to sit higher or lower inside the arc */
            margin-top: 20px;
        }

        .hero h1 {
            /* 'Kalam' for an Indian-handwritten look, or 'Pinyon Script' for royal calligraphy */
            font-family: 'Samarkan', serif;
            font-size: clamp(2.5rem, 10vw, 6rem);

            /* Elegant Gold Gradient Effect */
            background: linear-gradient(to bottom, #D4AF37 0%, #F4E07D 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            margin: 0;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            padding-bottom: 10px;
        }

        .hero-date {
            font-family: "Lavishly Yours", cursive;
            font-size: 2rem;
            letter-spacing: 4px;
            color: #333;
            font-weight: 500;
        }

        .hero-name {
            /* font-family: "Lavishly Yours", cursive; */
            font-size: 2rem;
            letter-spacing: 4px;
            color: #333;
            font-weight: 500;
        }

        /* Mobile Tweak */
        @media (max-width: 768px) {
            .hero {
                background-size: cover;
                /* Looks better on tall phone screens */
            }
        }

        /* Agenda Section */
        .section {
            padding: 80px 20px;
            text-align: center;
            max-width: 900px;
            margin: auto;
        }

        .agenda-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--marigold);
            margin-bottom: 10px;
        }

        /* RSVP Form */
        .rsvp-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--marigold);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background-color: var(--desi-red);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--marigold);
            transform: scale(1.05);
        }

        .mandala {
            width: 100px;
            opacity: 0.2;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- <section class="hero">
        <h1 data-aos="fade-down" data-aos-duration="2000">Romina & Hunter</h1>
        <p data-aos="fade-up" data-aos-duration="2000" style="font-size: 1.5rem; letter-spacing: 5px;">22 MAY 2026</p>
    </section> -->

    <section class="hero">
        <div class="hero-overlay">
            <h1 data-aos="fade-down" data-aos-duration="2000">Romina & Hunter</h1>
            <!-- <p data-aos="fade-up" data-aos-duration="2000" class="hero-name">Save the Date</p>
            <p data-aos="fade-up" data-aos-duration="2000" class="hero-date">22 May 2026</p> -->
            <!-- <p data-aos="fade-up" data-aos-duration="2000" class="hero-name">At</p>
            <p data-aos="fade-up" data-aos-duration="2000" class="hero-date">Paradise Inn Bolgoda</p>
            <p data-aos="fade-up" data-aos-duration="2000" class="hero-name">From</p>
            <p data-aos="fade-up" data-aos-duration="2000" class="hero-date">18:30</p> -->
        </div>
    </section>

    <section class="section">
        <img src="https://cdn-icons-png.flaticon.com/512/1043/1043514.png" class="mandala" alt="mandala">
        <h2 data-aos="fade-up">Our Celebration</h2>
        <p data-aos="fade-up">We can't wait to celebrate our big day with you. Here is what we have planned for our
            fusion wedding.</p>
    </section>

    <section class="section">
        <h2 data-aos="fade-right">The Agenda</h2>
        <div class="agenda-item" data-aos="zoom-in">
            <span><strong>10:00 AM</strong></span>
            <span>Baraat & Welcome</span>
        </div>
        <div class="agenda-item" data-aos="zoom-in" data-aos-delay="100">
            <span><strong>11:30 AM</strong></span>
            <span>Hindu Wedding Ceremony</span>
        </div>
        <div class="agenda-item" data-aos="zoom-in" data-aos-delay="200">
            <span><strong>7:00 PM</strong></span>
            <span>Grand Reception & Dinner</span>
        </div>
    </section>

    <section class="section" id="rsvp">
        <h2 data-aos="fade-up">Will You Join Us?</h2>
        <div class="rsvp-form" data-aos="flip-left">
            <form>
                <input type="text" placeholder="Full Name" required>
                <select required>
                    <option value="">Will you attend?</option>
                    <option value="yes">Joyfully Accept</option>
                    <option value="no">Regretfully Decline</option>
                </select>
                <textarea placeholder="Dietary Restrictions (e.g. Nut Allergy, Vegan, etc.)"></textarea>
                <button type="submit">Send RSVP</button>
            </form>
        </div>
    </section>

    <footer style="padding: 40px; text-align: center; background: var(--desi-red); color: white;">
        <p>Created with love for Romina & Hunter</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
